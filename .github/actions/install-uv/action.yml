name: install-uv
description: 'Install UV and set up Python'

inputs:
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.13'
  uv-version:
    description: 'UV version to use'
    required: false
    default: '0.7.8'

runs:
  using: "composite"
  steps:
    - name: Install uv and python
      id: uv-primary
      uses: astral-sh/setup-uv@v5
      continue-on-error: true
      with:
        enable-cache: true
        cache-dependency-glob: "ci/uv.lock"
        python-version: ${{ inputs.python-version }}
        version: ${{ inputs.uv-version }}

    - name: Retry uv install (no cache)
      if: steps.uv-primary.outcome == 'failure'
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: false
        python-version: ${{ inputs.python-version }}
        version: ${{ inputs.uv-version }}
