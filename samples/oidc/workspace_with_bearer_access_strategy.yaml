apiVersion: workspace.jupyter.org/v1alpha1
kind: Workspace
metadata:
  name: ws-bearer-public
  namespace: default
spec:
  displayName: "Public Workspace with Bearer Auth"
  image: uv
  desiredStatus: Running
  accessType: Public
  ownershipType: Public
  accessStrategy:
    name: bearer-access-strategy
    namespace: default
  resources:
    limits:
      cpu: "1"
      memory: "2Gi"
    requests:
      cpu: "0.5"
      memory: "1Gi"
