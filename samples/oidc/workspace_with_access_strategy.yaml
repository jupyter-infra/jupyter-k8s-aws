apiVersion: workspace.jupyter.org/v1alpha1
kind: Workspace
metadata:
  name: ws-gh-oauth-public
  namespace: default
spec:
  displayName: "Sample Workspace with Access Strategy"
  # Container image to use; keep commented for JD-based deployment
  # uncomment below for standalone deployment
  # image: uv
  desiredStatus: Running
  accessType: Public
  ownershipType: Public
  accessStrategy:
    name: oauth-access-strategy
    namespace: jupyter-k8s-shared
  resources:
    limits:
      cpu: "1"
      memory: "2Gi"
    requests:
      cpu: "0.5"
      memory: "1Gi"