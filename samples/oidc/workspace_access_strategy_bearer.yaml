apiVersion: workspace.jupyter.org/v1alpha1
kind: WorkspaceAccessStrategy
metadata:
  name: bearer-access-strategy
  namespace: default
spec:
  displayName: JupyterLab Routing Strategy with bearer token authentication
  createConnectionHandler: "k8s-native"
  accessResourceTemplates:
    # Network policy to restrict pod access
    - kind: NetworkPolicy
      apiVersion: networking.k8s.io/v1
      namePrefix: workspace-network-policy
      template: |
        spec:
          podSelector:
            matchLabels:
              workspace.jupyter.org/workspaceName: "{{ .Workspace.Name }}"
          policyTypes:
          - Ingress
          ingress:
          # Allow traffic from traefik pods in the router namespace
          - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: jupyter-k8s-router
              podSelector:
                matchLabels:
                  app: traefik
                  component: router
            ports:
            - port: 8888
              protocol: TCP
          # Allow traffic from the controller namespace
          - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: jupyter-k8s-system
            ports:
            - port: 8888
              protocol: TCP
    # The authorized route - tries token verification on already authenticated requests
    - kind: IngressRoute
      apiVersion: traefik.io/v1alpha1
      namePrefix: authorized-route
      template: |
        spec:
          entryPoints:
            - websecure
          routes:
            - match: "Host(`$DOMAIN`) && PathPrefix(`/workspaces/{{ .Workspace.Namespace }}/{{ .Workspace.Name }}/`)"
              kind: Rule
              priority: 100
              middlewares:
                - name: auth-headers
                  namespace: jupyter-k8s-router
                - name: authmiddleware-verify
                  namespace: jupyter-k8s-router
              services:
                - name: "{{ .Service.Name }}"
                  namespace: "{{ .Service.Namespace }}"
                  port: 8888

    # The bearer auth route - exchanges bearer token for session cookie
    - kind: IngressRoute
      apiVersion: traefik.io/v1alpha1
      namePrefix: bearer-auth-route
      template: |
        spec:
          entryPoints:
            - websecure
          routes:
            - match: "Host(`$DOMAIN`) && PathPrefix(`/workspaces/{{ .Workspace.Namespace }}/{{ .Workspace.Name }}/bearer-auth`)"
              kind: Rule
              priority: 110
              middlewares:
                - name: auth-headers
                  namespace: jupyter-k8s-router
                - name: authmiddleware-bearer-auth
                  namespace: jupyter-k8s-router
                - name: strip-bearer-auth-suffix
                  namespace: jupyter-k8s-router
              services:
                - name: "{{ .Service.Name }}"
                  namespace: "{{ .Service.Namespace }}"
                  port: 8888
  deploymentModifications:
    podModifications:
      primaryContainerModifications:
        mergeEnv:
          - name: JUPYTER_BASE_URL
            valueTemplate: "/workspaces/{{ .Workspace.Namespace }}/{{ .Workspace.Name }}/"
  accessURLTemplate: "https://$DOMAIN/workspaces/{{ .Workspace.Namespace }}/{{ .Workspace.Name }}/"
  bearerAuthURLTemplate: "https://$DOMAIN/workspaces/{{ .Workspace.Namespace }}/{{ .Workspace.Name }}/bearer-auth"
