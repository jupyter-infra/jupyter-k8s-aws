# [AWS HYPERPOD]: Configuration for aws-hyperpod deployment mode
# This includes presigned URL and remote access setup

namespace: jupyter-k8s-system

# AWS configuration
aws:
  region: ""

# [CLUSTER WEB UI]: Web interface configuration
clusterWebUI:
  enabled: false

  # Full domain for the application (required)
  domain: ""

  # AWS Certificate Manager ARN for SSL/TLS termination at load balancer
  awsCertificateArn: ""

  # ALB configuration
  alb:
    scheme: "internet-facing"  # or "internal"
    targetType: "ip"
    sslPolicy: "ELBSecurityPolicy-TLS13-1-2-2021-06"
    # Additional custom ALB annotations
    annotations: {}

  # External DNS configuration
  externalDns:
    enabled: true

  # Network policy configuration
  networkPolicy:
    enabled: true

  # [TRAEFIK]: Reverse proxy configuration
  traefik:
    shouldInstall: false
    repository: public.ecr.aws/docker/library
    imageName: traefik
    imageTag: latest
    replicas: 2
    redirectHttp: true
    debug: false
    allowCrossNamespace: true

  # Authentication middleware configuration
  auth:
    replicas: 2
    imagePullPolicy: Always
    repository: ghcr.io/jupyter-infra
    imageName: jupyter-k8s-authmiddleware
    imageTag: latest
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 200m
        memory: 256Mi
    jwtIssuer: "jupyter-k8s-auth"
    jwtAudience: "workspace-users"
    jwtExpiration: "1h"
    jwtRefreshEnable: "true"
    jwtRefreshWindow: "15m"
    jwtRefreshHorizon: "12h"
    jwtNewKeyUseDelay: "5s"
    # Secret name for multi-key JWT signing (StandardSigner)
    secretName: "authmiddleware-jwt-secrets"
    cookieName: "workspace_auth"
    cookieSecure: "true"
    cookiePath: "/"
    cookieMaxAge: "24h"
    cookieHttpOnly: "true"
    cookieSameSite: "lax"
    pathRegexPattern: "^(/).*$"
    routingMode: "subdomain"
    # Subdomain format: {workspace-name}-{b32-encoded-namespace}.domain
    # Split on last hyphen — safe because base32 alphabet is [A-Z2-7=], which never contains hyphens
    workspaceNameSubdomainRegex: "^(.*)-[^-]+$"
    workspaceNamespaceSubdomainRegex: "^.*-([^-]+)$"
    maxCookiePaths: "20"
    readTimeout: "10s"
    writeTimeout: "10s"
    shutdownTimeout: "30s"
    oauthEnabled: false
    enableBearerAuth: true

  # JWT Secret Rotator configuration
  rotator:
    enabled: true
    imagePullPolicy: Always
    repository: ghcr.io/jupyter-infra
    imageName: jupyter-k8s-rotator
    imageTag: latest
    rotationInterval: "15m"
    # Number of keys to keep (older keys are pruned after rotation)
    # Must satisfy: numberOfKeys * rotationInterval >= jwtExpiration + buffer
    # 6 keys * 15m rotation = 90m retention >= 1h expiration + 30m buffer
    numberOfKeys: 6
    resources:
      limits:
        cpu: 100m
        memory: 64Mi
      requests:
        cpu: 50m
        memory: 32Mi

# Remote access configuration
#
# accessMechanisms defines how users connect to workspaces. Each entry has a
# `type` and its own `configuration` block. Today exactly one of ssm/directSSH
# may be active; future releases add websocket and allow combinations.
#
#   type: ssm        - SSM Agent sidecar + remote-access-server (existing behavior)
#     configuration.ssmManagedNodeRole  (required)
#   type: directSSH  - vetted OpenSSH sshd via init container (direct VPC access)
#     configuration.dnsDomain            (required)
#
# directSSH prerequisites (configured separately, not deployed by this chart):
#   1. VPC CNI - Pods must have VPC-routable IPs (default on EKS with AWS VPC CNI)
#   2. ExternalDNS - Deployed with domain-filter matching the dnsDomain
#   3. Route53 Private Hosted Zone - Zone name must match the dnsDomain
#   4. Network connectivity - Clients in VPC or connected via VPN/Direct Connect
#   5. Security Group - Pod ENI SG must allow inbound TCP port 22 from VPN CIDR
#
# Example:
#   accessMechanisms:
#     - type: ssm
#       configuration:
#         ssmManagedNodeRole: "service-role/sagemaker-space-SSMManagedNode-..."
#     - type: directSSH
#       configuration:
#         dnsDomain: "spaces.example.com"
#
remoteAccess:
  enabled: false

  # Supported types: ssm, directSSH
  # Each entry requires a type and configuration block.
  # Only one of ssm/directSSH may be active at a time.
  #
  # For SSM:
  #   accessMechanisms:
  #     - type: ssm
  #       configuration:
  #         ssmManagedNodeRole: "service-role/sagemaker-space-SSMManagedNode-..."
  #
  # For directSSH:
  #   accessMechanisms:
  #     - type: directSSH
  #       configuration:
  #         dnsDomain: "spaces.example.com"
  #
  # When empty, falls back to legacy flat ssmManagedNodeRole field below.
  accessMechanisms: []

  # --- Shared SSM settings (used by the ssm mechanism; managed by service team) ---
  ssmSidecarImage:
    containerRegistry: ""
    repository: ""
    tag: ""
  ssmDocumentName: "AWS-StartSSHSession"
  sidecarContainerName: "ssm-agent-sidecar"
  workspaceContainerName: "workspace"
  registrationMarkerFile: "/tmp/ssm-registered"
  registrationStateFile: "/opt/amazon/sagemaker/workspace/.ssm-registration-state.json"
  registrationScript: "/usr/local/bin/register-ssm.sh"
  remoteAccessServerScript: "/opt/amazon/sagemaker/workspace/remote-access/start-remote-access-server.sh"
  remoteAccessServerPort: "2222"

  # --- Native SSH image (used by the directSSH mechanism; managed by service team) ---
  nativeSshImage:
    containerRegistry: ""
    repository: ""
    tag: ""

  # --- DEPRECATED: legacy flat SSM config, honored only when accessMechanisms is
  # empty. Supported for backwards compatibility with existing SSM deployments and
  # will be removed in a future release. Migrate to accessMechanisms above. ---
  ssmManagedNodeRole: ""

# [STORAGE] StorageClasses for Workspaces
storageClass:
  ebs:
    create: true
    name: sagemaker-spaces-default-storage-class
    isDefault: false
    provisioner: ebs.csi.aws.com
    reclaimPolicy: Delete
    volumeBindingMode: WaitForFirstConsumer
    parameters:
      type: gp3
      fsType: ext4
      encrypted: "true"

# Traefik subchart configuration
traefik:
  service:
    enabled: false
  ingressClass:
    enabled: false
  deployment:
    enabled: false
