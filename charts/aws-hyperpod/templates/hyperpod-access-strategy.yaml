apiVersion: workspace.jupyter.org/v1alpha1
kind: WorkspaceAccessStrategy
metadata:
  name: hyperpod-access-strategy
  namespace: {{ .Release.Namespace }}
spec:
  displayName: HyperPod Access Strategy
  {{- if .Values.clusterWebUI.enabled }}
  accessResourceTemplates:
    # The authorized route - tries token verification on already authenticated requests
    - kind: IngressRoute
      apiVersion: traefik.io/v1alpha1
      namePrefix: authorized-route
      template: |
        spec:
          entryPoints:
            - web
          routes:
            - match: "Host(`{{`{{ .Workspace.Name }}`}}-{{`{{ b32encode .Workspace.Namespace }}`}}.{{ .Values.clusterWebUI.domain }}`)"
              kind: Rule
              priority: 100
              middlewares:
                - name: auth-headers
                  namespace: {{ .Release.Namespace }}
                - name: authmiddleware-verify
                  namespace: {{ .Release.Namespace }}
              services:
                - name: "{{`{{ .Service.Name }}`}}"
                  namespace: "{{`{{ .Service.Namespace }}`}}"
                  port: 8888

    # The unauthorized route - handles bearer-auth path for initial authentication
    - kind: IngressRoute
      apiVersion: traefik.io/v1alpha1
      namePrefix: unauthorized-route
      template: |
        spec:
          entryPoints:
            - web
          routes:
            - match: "Host(`{{`{{ .Workspace.Name }}`}}-{{`{{ b32encode .Workspace.Namespace }}`}}.{{ .Values.clusterWebUI.domain }}`) && PathPrefix(`/bearer-auth`)"
              kind: Rule
              priority: 110  # Higher priority specifically for bearer-auth paths
              middlewares:
                - name: auth-headers
                  namespace: {{ .Release.Namespace }}
                - name: authmiddleware-bearer-auth
                  namespace: {{ .Release.Namespace }}
                - name: strip-bearer-auth-suffix
                  namespace: {{ .Release.Namespace }}
              services:
                - name: "{{`{{ .Service.Name }}`}}"
                  namespace: "{{`{{ .Service.Namespace }}`}}"
                  port: 8888
  {{- else }}
  accessResourceTemplates: []
  {{- end }}

  {{- if .Values.clusterWebUI.enabled }}
  bearerAuthURLTemplate: "https://{{`{{ .Workspace.Name }}`}}-{{`{{ b32encode .Workspace.Namespace }}`}}.{{ .Values.clusterWebUI.domain }}/bearer-auth"
  accessStartupProbe:
    httpGet:
      urlTemplate: "https://{{`{{ .Workspace.Name }}`}}-{{`{{ b32encode .Workspace.Namespace }}`}}.{{ .Values.clusterWebUI.domain }}/"
      additionalSuccessStatusCodes: [401]
    initialDelaySeconds: 1
    periodSeconds: 2
    failureThreshold: 20
  {{- end }}

  createConnectionHandler: "k8s-native"
  {{- if .Values.remoteAccess.enabled }}
  createConnectionHandlerMap:
    vscode-remote: "aws:createSession"
  {{- end }}
  podEventsHandler: "aws:ssm-remote-access"

  {{- if .Values.remoteAccess.enabled }}
  createConnectionContext:
    podUid: "extensionapi::PodUid()"
    ssmDocumentName: "{{ .Values.remoteAccess.ssmDocumentName }}"
    port: "{{ .Values.remoteAccess.remoteAccessServerPort }}"
  podEventsContext:
    podUid: "controller::PodUid()"
    region: "{{ required "aws.region is required when remoteAccess is enabled" .Values.aws.region }}"
    ssmManagedNodeRole: "{{ .Values.remoteAccess.ssmManagedNodeRole }}"
    sidecarContainerName: "{{ .Values.remoteAccess.sidecarContainerName }}"
    workspaceContainerName: "{{ .Values.remoteAccess.workspaceContainerName }}"
    registrationStateFile: "{{ .Values.remoteAccess.registrationStateFile }}"
    registrationMarkerFile: "{{ .Values.remoteAccess.registrationMarkerFile }}"
    registrationScript: "{{ .Values.remoteAccess.registrationScript }}"
    remoteAccessServerScript: "{{ .Values.remoteAccess.remoteAccessServerScript }}"
    remoteAccessServerPort: "{{ .Values.remoteAccess.remoteAccessServerPort }}"
  {{- end }}

  # Deployment modifications for SSM remote access
  deploymentModifications:
    podModifications:
      {{- if .Values.remoteAccess.enabled }}
      additionalContainers:
        - name: "{{ .Values.remoteAccess.sidecarContainerName }}"
          image: "{{ .Values.remoteAccess.ssmSidecarImage.containerRegistry }}/{{ .Values.remoteAccess.ssmSidecarImage.repository }}:{{ .Values.remoteAccess.ssmSidecarImage.tag }}"
          command:
            - /opt/amazon/sagemaker/workspace/bin/entrypoint-workspace-sidecar-container
          resources:
            requests:
              cpu: "100m"
              memory: "1Gi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          volumeMounts:
            - name: "workspace-base"
              mountPath: "/opt/amazon/sagemaker/workspace"
          startupProbe:
            exec:
              command: ["/usr/local/bin/ssm-agent-health-check.sh"]
            initialDelaySeconds: 1
            periodSeconds: 1
            failureThreshold: 300
          livenessProbe:
            exec:
              command: ["/usr/local/bin/ssm-agent-health-check.sh"]
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            exec:
              command: ["test", "-f", "{{ .Values.remoteAccess.registrationMarkerFile }}"]
            initialDelaySeconds: 2
            periodSeconds: 2
      {{- end }}

      volumes:
        - name: "workspace-base"
          emptyDir:
            sizeLimit: "1Gi"

      initContainers:
        - name: workspace-init-container
          image: "{{ .Values.remoteAccess.ssmSidecarImage.containerRegistry }}/{{ .Values.remoteAccess.ssmSidecarImage.repository }}:{{ .Values.remoteAccess.ssmSidecarImage.tag }}"
          command:
            - /opt/amazon/sagemaker/workspace/bin/entrypoint-workspace-init-container
          volumeMounts:
            - name: workspace-base
              mountPath: /workspace_base_dir

      primaryContainerModifications:
        volumeMounts:
          - name: "workspace-base"
            mountPath: "/opt/amazon/sagemaker/workspace"
        mergeEnv:
          - name: WORKSPACE_NAMESPACE
            valueTemplate: "{{`{{ .Workspace.Namespace }}`}}"
          - name: WORKSPACE_NAME
            valueTemplate: "{{`{{ .Workspace.Name }}`}}"
          - name: WORKSPACE_ACCESS_TYPE
            valueTemplate: "{{`{{ .Workspace.Spec.AccessType }}`}}"
          - name: WORKSPACE_APP_TYPE
            valueTemplate: "{{`{{ .Workspace.Spec.AppType }}`}}"
          - name: WORKSPACE_CREATOR_USERNAME
            valueTemplate: "{{`{{ index .Workspace.Annotations \"workspace.jupyter.org/created-by\" }}`}}"
          - name: JUPYTER_BASE_URL
            valueTemplate: "/workspaces/{{`{{ .Workspace.Namespace }}`}}/{{`{{ .Workspace.Name }}`}}/"
