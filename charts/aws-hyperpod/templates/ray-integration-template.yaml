{{- if .Values.rayIntegration.enabled }}
#
# Ray Cluster Integration — WorkspaceIntegrationTemplate (admin-installed, chart-managed)
#
# An admin installs this once per cluster; each customer only supplies the RayCluster name (and
# optionally namespace) via their Workspace's integrationTemplateRefs[].parameters. It injects a
# "ray-sidecar" that joins the RayCluster as a zero-resource client node, plus the env/volumes the
# workspace's Ray client needs to attach.
#
# HELM ESCAPING: the operator's own Go-template expressions are wrapped in Helm's backtick idiom so
# Helm renders them through verbatim. Helm evaluates this whole file first (comments included), so
# only the chart-level .Values / .Release references are Helm's; everything else is the operator's.
#
# VERSION MATCHING (customer responsibility): Ray requires the client (workspace) and cluster to
# match on Ray version AND Python version to the patch level. The sidecar image is resolved from the
# RayCluster head image, so the cluster head image must match the workspace image's Ray/Python.
# public.ecr.aws/sagemaker/sagemaker-distribution ships both JupyterLab and a matching Ray; the
# simplest guarantee is to run the RayCluster head on the same Ray/Python as the workspace image.
#
# OBJECT STORE / SHARED MEMORY SIZING: Ray's object store (plasma) lives in /dev/shm. Containers
# default /dev/shm to 64MB, so without intervention Ray spills to /tmp (slow) and warns. In a
# container Ray's auto-sizing is non-deterministic (it may read the cgroup limit OR the whole node's
# RAM), so we PIN the object store explicitly and keep three values coupled and consistent:
#     --object-store-memory  ==  /dev/shm emptyDir sizeLimit  <=  sidecar memory limit (minus overhead)
# Defaults below use a modest 1Gi object store appropriate for a connection broker. Raise all three
# together for workloads that pull large Ray Data results back into the workspace.
#
apiVersion: workspace.jupyter.org/v1alpha1
kind: WorkspaceIntegrationTemplate
metadata:
  name: ray-integration
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: jupyter-k8s-aws-hyperpod
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  displayName: "Ray Cluster Integration"   # human-facing label shown in an integration picker UI

  # parameters declares the contract the workspace fills in. Every {{`{{ .Parameters.X }}`}} this
  # template references MUST be declared here: the validating webhook rejects a template that
  # references an undeclared parameter (author typo) and rejects a referencing workspace that omits a
  # declared one. Both values below are customer-supplied on the Workspace's
  # integrationTemplateRefs[].parameters.
  parameters:
    - name: rayClusterName        # which RayCluster to join
    - name: rayClusterNamespace   # its namespace; the UI pre-fills the workspace's own namespace

  # shareProcessNamespace: the workspace container must see the Ray process that runs in the
  # ray-sidecar (the workspace attaches to the local Ray session the sidecar starts). A shared PID
  # namespace makes the sidecar's processes visible to — and signalable by — the workspace container.
  # Both run as uid 1000 (see the sidecar securityContext), so the cross-container signal/attach
  # works without granting root.
  shareProcessNamespace: true

  # resourceRefs: fetch the customer-named RayCluster at reconcile time so we can read live values
  # from it (head image, head service name, GCS port). metadata.name/namespace support templates.
  # Each entry has a `name` handle, referenced below as {{`{{ resource "<name>" "<jsonpath>" }}`}}.
  resourceRefs:
    - name: rayCluster                    # handle used in template expressions below
      apiVersion: ray.io/v1               # KubeRay RayCluster API group/version
      kind: RayCluster
      metadata:
        name: "{{`{{ .Parameters.rayClusterName }}`}}"        # customer-supplied on the workspace
        # Namespace of the RayCluster. The UI pre-fills rayClusterNamespace with the workspace's own
        # namespace (the HyperPod single-tenant-namespace default), but the customer can point at a
        # RayCluster in another namespace by overriding this parameter.
        namespace: "{{`{{ .Parameters.rayClusterNamespace }}`}}"

  # statusProbe: the operator periodically execs this command in the workspace container and records
  # the verdict in workspace.status.integrationStatuses[]. It is report-only (named statusProbe, not
  # readinessProbe, because it never gates the pod or restarts it) — it surfaces integration health
  # only. `ray status` exits 0 only when the local Ray session can reach the cluster's GCS, so it
  # catches data-plane failures (e.g. a GCS reconnect loop) that a control-plane RayCluster .status
  # check would miss.
  statusProbe:
    exec:
      command: ["ray", "status"]

  deploymentModifications:
    podModifications:
      additionalContainers:
        - name: ray-sidecar
          # Image resolved from the RayCluster head container, guaranteeing the sidecar's Ray binary
          # matches the cluster it joins. (Workspace<->cluster version match is still the customer's
          # responsibility — see header.)
          image: '{{`{{ resource "rayCluster" "{.spec.headGroupSpec.template.spec.containers[0].image}" }}`}}'
          # Use /bin/sh (not /bin/bash): the sidecar inherits the customer's RayCluster head image,
          # which we do not control. Slim/distroless Ray images (e.g. rayproject/ray:*-slim) ship
          # without /bin/bash and would CrashLoopBackOff on "/bin/bash: not found". /bin/sh is present
          # on effectively all images, and the args below use no bash-specific syntax.
          command: ["/bin/sh", "-c"]
          args:
            # Join the RayCluster as a zero-resource client node.
            #   --address=<head-svc>.<ns>.svc.cluster.local:<gcs-port>
            #        Head service DNS name and GCS port are read from RayCluster .status, which
            #        KubeRay owns and keeps correct even if naming/port conventions change. The
            #        service DNS (not the pod IP) is stable across head restarts, enabling
            #        auto-reconnect.
            #   --num-cpus=0 --num-gpus=0  the sidecar contributes NO compute and advertises no GPUs,
            #        so the Ray scheduler never places tasks/actors on the workspace pod. It exists
            #        only to host the local Ray session the workspace attaches to.
            #   --object-store-memory  EXPLICITLY pin the plasma object store to 1Gi. We do NOT let
            #        Ray auto-size it: inside a container Ray may read either the cgroup limit OR the
            #        whole node's RAM (non-deterministic), and if it reads node RAM it sizes the store
            #        far larger than the sidecar's limit and OOM-kills it. Pinning makes the footprint
            #        deterministic. This 1Gi must stay coupled to two other values: the /dev/shm
            #        sizeLimit (>= this, or Ray fails to start) and the sidecar memory limit
            #        (>= this + raylet/temp overhead). Raise all three together for heavier data pulls.
            #   --temp-dir=/tmp/ray  explicit shared session dir (see ray-tmp volume); the workspace
            #        attaches via this dir, so it must be deterministic.
            #   --block  keep ray in the foreground so the container stays alive; on exit k8s restarts
            #        it and it re-resolves the head DNS (this is how head-restart auto-recovery works).
            - >-
              ray start
              --address={{`{{ resource "rayCluster" "{.status.head.serviceName}" }}`}}.{{`{{ .Parameters.rayClusterNamespace }}`}}.svc.cluster.local:{{`{{ resource "rayCluster" "{.status.endpoints.gcs-server}" }}`}}
              --num-cpus=0
              --num-gpus=0
              --object-store-memory=1073741824
              --temp-dir=/tmp/ray
              --block
          resources:
            # NON-ZERO requests (a 0 request makes the sidecar first to be evicted and gives the
            # scheduler no signal). The memory limit must be >= object-store (1Gi) + raylet overhead
            # (~256Mi) + the /tmp/ray tmpfs; 1.5Gi covers a 1Gi object store with headroom. These
            # three are coupled: object-store-memory (1Gi) <= /dev/shm sizeLimit (1Gi) <= covered by
            # this memory limit. Raise all three together for heavier Ray Data result-pulling.
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1536Mi"
          securityContext:
            # runAsUser/Group 1000/100 is an ASSUMPTION about BOTH images: the workspace image and
            # the resolved sidecar (RayCluster head) image must run as uid 1000 so they share the
            # /tmp/ray session dir. sagemaker-distribution (sagemaker-user) and rayproject/ray (ray)
            # both use uid 1000, so this works today — but it is image coupling. If either image uses
            # a different uid, the workspace cannot read the sidecar's session files and ray.init()
            # fails. Document this requirement for custom images.
            runAsUser: 1000
            runAsGroup: 100
            runAsNonRoot: true              # defense-in-depth: never run as root
            allowPrivilegeEscalation: false # defense-in-depth
            capabilities:
              drop: ["ALL"]                 # sidecar needs no Linux capabilities
          # NOTE: the sidecar deliberately has NO readinessProbe. Ray connectivity is reported by the
          # statusProbe above (operator-run, report-only, surfaced in workspace.status.integrationStatuses[]).
          # A container readinessProbe here would instead GATE pod readiness on Ray-cluster health -- a
          # RayCluster outage would flip the pod NotReady and drop the Workspace to Available=False
          # even though JupyterLab itself is fine. The sidecar exposes no service ports, so readiness
          # gating buys nothing; keep Ray health non-gating and let statusProbe be the single source
          # of integration health.
          volumeMounts:
            - name: ray-tmp
              mountPath: /tmp/ray
            # Real shared-memory mount: container /dev/shm defaults to 64MB, which is too small for
            # Ray's plasma object store and triggers the "object store using /tmp instead of /dev/shm"
            # warning + degraded performance. Mount a tmpfs at /dev/shm sized to the object store
            # (1Gi). NOTE: /dev/shm sizeLimit must be >= --object-store-memory or Ray fails to start
            # with "object store size exceeds the capacity of /dev/shm".
            - name: ray-dshm
              mountPath: /dev/shm
      volumes:
        - name: ray-tmp
          # tmpfs shared session dir (Ray session/temp IO is latency-sensitive). Shared between the
          # sidecar and the workspace container so the workspace's ray.init() discovers the sidecar's
          # local Ray session. Cap bounds the tmpfs against the pod memory limit.
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
        - name: ray-dshm
          # tmpfs /dev/shm sized to match --object-store-memory (1Gi). medium: Memory means this
          # counts against container memory, which is why the sidecar memory limit (1536Mi) is sized
          # to cover it plus the raylet. Keep this == object-store-memory; raise both together.
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
      primaryContainerModifications:
        volumeMounts:
          # Mount the SAME session dir into the workspace container so ray.init() (RAY_ADDRESS=auto)
          # finds the local session the sidecar created.
          - name: ray-tmp
            mountPath: /tmp/ray
          # The workspace client also materializes Ray Data blocks locally when results are pulled
          # back into the notebook, so it needs the same enlarged /dev/shm, not the 64MB default.
          - name: ray-dshm
            mountPath: /dev/shm
        mergeEnv:
          # RAY_ADDRESS=auto: ray.init() with no arguments attaches to the local session in /tmp/ray
          # (created by the sidecar) instead of bootstrapping a new cluster. This is the single most
          # important env var — it is what makes ray.init() succeed from the workspace.
          - name: RAY_ADDRESS
            valueTemplate: "auto"
          # Informational only (handy for debugging version-match issues). Safe to omit.
          - name: RAY_HEAD_IMAGE
            valueTemplate: '{{`{{ resource "rayCluster" "{.spec.headGroupSpec.template.spec.containers[0].image}" }}`}}'
          - name: RAY_CLUSTER_NAME
            valueTemplate: "{{`{{ .Parameters.rayClusterName }}`}}"
{{- end }}
