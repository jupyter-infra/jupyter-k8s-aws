{{- if and .Values.clusterWebUI.enabled .Values.clusterWebUI.rotator.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: authmiddleware-jwt-rotator
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "jupyter-k8s-aws-hyperpod.labels" . | nindent 4 }}
    app: authmiddleware-jwt-rotator
    component: security
---
# Role for managing JWT signing secrets (key rotation)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: authmiddleware-jwt-rotator-role
  namespace: {{ .Values.namespace }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["{{ .Values.clusterWebUI.auth.secretName }}"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: authmiddleware-jwt-rotator-rolebinding
  namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: authmiddleware-jwt-rotator-role
subjects:
  - kind: ServiceAccount
    name: authmiddleware-jwt-rotator
    namespace: {{ .Values.namespace }}
{{- end }}
