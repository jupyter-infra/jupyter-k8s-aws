apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: oauth2-proxy-network-policy
  namespace: {{ .Values.namespace }}
  labels:
    app: oauth2-proxy
    component: auth
spec:
  podSelector:
    matchLabels:
      app: oauth2-proxy
      component: auth
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from traefik pods in the same namespace only
  - from:
    - podSelector:
        matchLabels:
          app: traefik
          component: router
      # Ensure the traffic only comes from pods in the same namespace
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Values.namespace }}
    ports:
    - port: 4180
      protocol: TCP
  egress:
  # Allow DNS resolution
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # Allow HTTPS outbound connections (Dex via the public domain)
  - ports:
    - port: 443
      protocol: TCP
  # Allow the wait-for-dex init gate to reach dex:5556/dex/healthz.
  # This is plaintext, so scope it to the dex pods in this namespace.
  - to:
    - podSelector:
        matchLabels:
          app: dex
          component: oauth
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Values.namespace }}
    ports:
    - port: 5556
      protocol: TCP