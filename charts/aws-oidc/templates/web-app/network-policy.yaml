{{- if .Values.webApp.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: web-app-network-policy
  namespace: {{ .Values.namespace }}
  labels:
    app: web-app
    component: web-app
spec:
  podSelector:
    matchLabels:
      app: web-app
      component: web-app
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from traefik pods in the same namespace only
  - from:
    - podSelector:
        matchLabels:
          app: traefik
          component: router
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Values.namespace }}
    ports:
    - port: 8090
      protocol: TCP
  egress:
  # Allow DNS resolution
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # Allow HTTPS outbound connections
  # (Kubernetes API server via KUBERNETES_SERVICE_HOST:443 and Dex via the public domain)
  - ports:
    - port: 443
      protocol: TCP
{{- end }}
