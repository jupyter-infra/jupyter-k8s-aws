{{- if .Values.webApp.enabled }}
# Fast path: requests with session cookie bypass OAuth2 Proxy
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: web-app-session
  namespace: {{ .Values.namespace }}
  labels:
    app: web-app
    component: web-app
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.domain }}`) && PathPrefix(`/api/`) && HeaderRegexp(`Cookie`, `{{ .Values.webApp.session.cookieName }}=`)
      priority: 15
      kind: Rule
      services:
        - name: web-app
          port: 8090
          namespace: {{ .Values.namespace }}
  tls: {}
---
# Auth path: API requests without session cookie go through OAuth2 Proxy
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: web-app-auth
  namespace: {{ .Values.namespace }}
  labels:
    app: web-app
    component: web-app
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.domain }}`) && PathPrefix(`/api/`)
      priority: 10
      kind: Rule
      middlewares:
        - name: oauth-auth-redirect
          namespace: {{ .Values.namespace }}
      services:
        - name: web-app
          port: 8090
          namespace: {{ .Values.namespace }}
  tls: {}
---
# Static/SPA catch-all: always through OAuth2 Proxy
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: web-app
  namespace: {{ .Values.namespace }}
  labels:
    app: web-app
    component: web-app
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.domain }}`) && PathPrefix(`/`)
      priority: 5
      kind: Rule
      middlewares:
        - name: oauth-auth-redirect
          namespace: {{ .Values.namespace }}
      services:
        - name: web-app
          port: 8090
          namespace: {{ .Values.namespace }}
  tls: {}
{{- end }}
