apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dex-network-policy
  namespace: {{ .Values.namespace }}
  labels:
    app: dex
    component: oauth
spec:
  podSelector:
    matchLabels:
      app: dex
      component: oauth
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from traefik pods in the same namespace only
  - from:
    - podSelector:
        matchLabels:
          app: traefik
          component: router
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Values.namespace }}
    ports:
    - port: 5556
      protocol: TCP
  # Allow in-cluster wait-for-dex health gate from oauth2-proxy/authmiddleware init containers
  - from:
    - podSelector:
        matchExpressions:
        - key: app
          operator: In
          values:
          - oauth2-proxy
          - authmiddleware
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Values.namespace }}
    ports:
    - port: 5556
      protocol: TCP
  egress:
  # Allow DNS resolution
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # Allow HTTPS outbound connections (GitHub OAuth, Kubernetes API server)
  - ports:
    - port: 443
      protocol: TCP
  # Allow the wait-for-traefik init gate to reach traefik-healthcheck:9000/ping.
  # This is plaintext, so scope it to the traefik router pods in this namespace.
  - to:
    - podSelector:
        matchLabels:
          app: traefik
          component: router
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Values.namespace }}
    ports:
    - port: 9000
      protocol: TCP