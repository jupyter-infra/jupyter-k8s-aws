{{- if .Values.authmiddleware.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: authmiddleware-network-policy
  namespace: {{ .Values.namespace }}
  labels:
    app: authmiddleware
    component: auth
spec:
  podSelector:
    matchLabels:
      app: authmiddleware
      component: auth
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from traefik pods in the same namespace only
  - from:
    - podSelector:
        matchLabels:
          app: traefik
          component: router
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Values.namespace }}
    ports:
    - port: 8080
      protocol: TCP
  egress:
  # Allow DNS resolution
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # Allow HTTPS outbound connections. authmiddleware reaches the Kubernetes
  # API server via the in-cluster kubernetes.default service (rest.InClusterConfig
  # → KUBERNETES_SERVICE_HOST:KUBERNETES_SERVICE_PORT), which is :443 on EKS.
  - ports:
    - port: 443
      protocol: TCP
  # Allow the wait-for-dex init gate to reach dex:5556/dex/healthz.
  # This is plaintext, so scope it to the dex pods in this namespace.
  - to:
    - podSelector:
        matchLabels:
          app: dex
          component: oauth
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Values.namespace }}
    ports:
    - port: 5556
      protocol: TCP
{{- end }}