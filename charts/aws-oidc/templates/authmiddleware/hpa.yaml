{{- /* Render only when KEDA is enabled AND its CRD is installed. The CRD check
       degrades a missing KEDA install to "no autoscaler" instead of a hard
       `no matches for kind "ScaledObject"` helm failure. Clusters without the
       KEDA operator simply skip this resource. */ -}}
{{- if and .Values.authmiddleware.keda.enabled (.Capabilities.APIVersions.Has "keda.sh/v1alpha1") }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: authmiddleware
  namespace: {{ .Values.namespace }}
  labels:
    app: authmiddleware
    component: auth
spec:
  scaleTargetRef:
    name: authmiddleware
  minReplicaCount: {{ .Values.authmiddleware.keda.minReplicas }}
  maxReplicaCount: {{ .Values.authmiddleware.keda.maxReplicas }}
  cooldownPeriod: {{ .Values.authmiddleware.keda.cooldownPeriodSeconds }}
  pollingInterval: {{ .Values.authmiddleware.keda.pollingIntervalSeconds }}
  fallback:
    failureThreshold: 3
    replicas: {{ .Values.authmiddleware.keda.minReplicas }}
  triggers:
    - type: prometheus
      metadata:
        serverAddress: {{ .Values.authmiddleware.keda.prometheusAddress }}
        # Total open connections on Traefik's websecure entrypoint, used as a
        # proxy for authmiddleware load.
        #
        # Why open connections, not request rate:
        # authmiddleware is a Traefik ForwardAuth — it is called on EVERY request
        # to every workspace IngressRoute (there is no session cookie bypass for
        # workspace traffic, unlike web-app). Each active workspace user holds a
        # persistent WebSocket through Traefik, generating a continuous stream of
        # ForwardAuth calls. Open connections is therefore a reliable, low-noise
        # proxy for authmiddleware load — it rises and falls with active workspace
        # sessions rather than spiking on burst traffic.
        #
        # Why Traefik's metric instead of authmiddleware's own /metrics:
        # authmiddleware exposes controller-runtime internals on :9090, not HTTP
        # request counters. Traefik is the single source of truth for traffic volume.
        #
        # Caveats:
        # - web-app (UI/API) traffic does NOT pass through authmiddleware — only
        #   workspace IngressRoutes are ForwardAuth-gated. Total websecure
        #   connections therefore overcounts authmiddleware's real load, which is
        #   conservative (scales a little early) and acceptable.
        # - this scales on connection count only, not CPU/memory. That is fine as
        #   long as authmiddleware resources are sized for the per-connection work;
        #   revisit if a load test shows memory pressure before the connection
        #   threshold trips.
        #
        # This is the RAW total. metricType defaults to AverageValue, so KEDA/HPA
        # divides it by the authmiddleware replica count before comparing to
        # threshold — desiredReplicas = ceil(total / threshold). Do NOT add
        # "/ count(...)": the numerator counts Traefik series, so dividing here
        # would scale authmiddleware on Traefik's pod count instead of its own.
        query: sum(traefik_open_connections{entrypoint="websecure"})
        # Target open connections per authmiddleware pod.
        threshold: {{ .Values.authmiddleware.keda.targetOpenConnections | quote }}
{{- end }}
