{{- if .Values.authmiddleware.keda.enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: authmiddleware
  namespace: {{ .Values.namespace }}
  labels:
    app: authmiddleware
    component: auth
spec:
  scaleTargetRef:
    name: authmiddleware
  minReplicaCount: {{ .Values.authmiddleware.keda.minReplicas }}
  maxReplicaCount: {{ .Values.authmiddleware.keda.maxReplicas }}
  cooldownPeriod: 300
  pollingInterval: 30
  triggers:
    - type: prometheus
      metadata:
        serverAddress: {{ .Values.authmiddleware.keda.prometheusAddress }}
        # Average open connections per authmiddleware pod, sourced from Traefik.
        #
        # Why open connections, not request rate:
        # authmiddleware is a Traefik ForwardAuth — it is called on EVERY request
        # to every workspace IngressRoute (there is no session cookie bypass for
        # workspace traffic, unlike web-app). Each active workspace user holds a
        # persistent WebSocket through Traefik, generating a continuous stream of
        # ForwardAuth calls. Open connections is therefore a reliable, low-noise
        # proxy for authmiddleware load — it rises and falls with active workspace
        # sessions rather than spiking on burst traffic.
        #
        # Why Traefik's metric instead of authmiddleware's own /metrics:
        # authmiddleware exposes controller-runtime internals on :9090, not HTTP
        # request counters. Traefik is the single source of truth for traffic volume.
        query: |
          sum(traefik_open_connections{entrypoint="websecure"}) /
          count(traefik_open_connections{entrypoint="websecure"})
        threshold: {{ .Values.authmiddleware.keda.targetOpenConnections | quote }}
{{- end }}
