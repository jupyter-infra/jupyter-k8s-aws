# [AWS OIDC]: Configuration for aws-oidc deployment mode

# Node selector labels applied to all chart component pods (default: no constraint).
# Set per deployment to pin pods to specific nodes; overridable per-component below.
nodeSelector: {}

# Tolerations applied to all chart component pods (default: none).
# Set per deployment when target nodes carry taints; overridable per-component below.
tolerations: []

# Init container image used for readiness checks
initImage:
  repository: docker.io/busybox
  tag: "1.38"

# Default namespace for Traefik Middlewares and other resources
# This should be left as the default for normal operation
namespace: jupyter-k8s-router

# Full domain for the application (required)
domain: ""

# External DNS configuration
externalDns:
  enabled: true


# [STORAGE] StorageClasses for Workspaces
storageClass:
  ebs:
    create: true
    name: ebs-sc
    isDefault: false
    provisioner: ebs.csi.aws.com
    reclaimPolicy: Delete
    volumeBindingMode: WaitForFirstConsumer
    parameters:
      type: gp3
      fsType: ext4
  efs:
    create: false
    name: efs-sc
    provisioner: efs.csi.aws.com
    reclaimPolicy: Delete
    volumeBindingMode: WaitForFirstConsumer
    parameters:
      provisioningMode: efs-ap
      fileSystemId: ""
      directoryPerms: "700"
      basePath: "/shared-data"
      uid: "65532"
      gid: "65532"

# [CERT-MANAGER]: Configuration for cert-manager
certManager:
  # Email address for Let's Encrypt notifications
  email: ""
  # Whether to use staging or production Let's Encrypt server
  useStaging: false

# [TRAEFIK]: Configuration for Traefik
traefik:
  # Always enabled for this chart
  enabled: true
  # Traefik deployment image repository
  repository: docker.io
  # Traefik deployment image name
  imageName: traefik
  # Traefik deployment image tag
  imageTag: v3.7.7
  # Number of traefik replicas (used when keda.enabled is false)
  replicas: 2
  # KEDA ScaledObject configuration — scales Traefik based on open connections.
  # Opt-in: enable only on clusters that have the KEDA operator + CRDs and a
  # Prometheus reachable at prometheusAddress below.
  keda:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    # How long to wait after the last scale-up before scaling down.
    cooldownPeriodSeconds: 300
    # How often KEDA queries Prometheus for the metric.
    pollingIntervalSeconds: 30
    # Scale up when average open connections per replica exceeds this threshold.
    targetOpenConnections: "100"
    prometheusAddress: "http://prometheus-server.monitoring.svc.cluster.local:80"
  # Redirect HTTP to HTTPS
  redirectHttp: true
  # Whether to configure traefik at 'debug' log level ('info' if omitted)
  debug: true
  # Allow cross-namespace middleware references
  allowCrossNamespace: true
  # Node selector for traefik pods (overrides chart-level nodeSelector)
  nodeSelector: {}
  # Tolerations for traefik pods (overrides chart-level tolerations)
  tolerations: []

# Dex configuration
dex:
  # Number of dex replicas (static — auth only, negligible load)
  replicas: 1
  # Dex image settings
  repository: ghcr.io/dexidp/dex
  imageTag: v2.45.1
  # initContainer config for traefik availability checks
  traefikCheck:
    # Maximum time to wait for traefik availability
    timeout_seconds: 60
  # initContainer config for TLS certificate readiness checks
  certCheck:
    # Maximum time to wait for TLS certificate to be ready
    timeout_seconds: 300

  # Node selector for dex pods (overrides chart-level nodeSelector)
  nodeSelector: {}
  # Tolerations for dex pods (overrides chart-level tolerations)
  tolerations: []
  # Prefix for the username k8s identity authenticated through Dex
  oidcUsernamePrefix: "github:"
  # Prefix for the k8s groups authenticated through Dex
  oidcGroupPrefix: "github:"

  # Client ID for oauth2-proxy to authenticate with Dex
  # Must match the Kubernetes OIDC client ID for tokens to work with K8s API
  oauth2ProxyClientId: "kubectl-oidc"
  # Client secret for oauth2-proxy to authenticate with Dex (auto-generated if empty)
  # Generate with 'openssl rand -hex 16'
  oauth2ProxyClientSecret: ""

  # Client ID for kubernetes to authenticate with Dex (auto-generated if empty)
  kubernetesClientId: "kubectl-oidc"
  # Client secret for Kubernetes to authenticate with Dex
  # To set: generate with 'openssl rand -hex 16'
  # Leave empty to use Dex's 'public: true' option (recommended for kubectl oidc-login)
  kubernetesClientSecret: ""
  # Client localhost:PORT to set for redirect
  kubernetesClientRedirectPorts:
    - 8000
    - 18000
    - 9800

# Github OAuth configuration
github:
  # GitHub OAuth client ID (required)
  clientId: ""
  # GitHub OAuth client secret (required)
  clientSecret: ""
  # GitHub organizations to allow access
  orgs: []
    # - name: example-org-2
    #   teams:
    #     - team-1
    # GitHub oauth can support teamless org membership access
    # However dex cannot match it to a group, so do NOT use
    # - name: example-org

# [ACCESS STRATEGY]: WorkspaceAccessStrategy resources shipped by this chart
accessStrategy:
  # Create the OAuth access strategy (GitHub OAuth flow via Dex/oauth2-proxy)
  createOAuth: true
  # Create the bearer token access strategy (requires authmiddleware.enableBearerAuth)
  createBearer: false
  # Create per-workspace NetworkPolicy as an access resource.
  # Set to false when namespace-level network policies are managed externally
  # (e.g. by the deployment template) or when large workspace counts make
  # per-workspace netpols undesirable.
  createNetworkPolicy: true
  # Create the target namespace if it doesn't exist.
  # Default is false because jupyter-k8s-system is created by the operator chart.
  # Set to true only when targeting a namespace not managed by another Helm release.
  createNamespace: false
  # Namespace where the WorkspaceAccessStrategy resources are created
  namespace: jupyter-k8s-system

# RBAC to create
githubRbac:
  # whether to create RBAC resources at all
  create: true
  # Namespace for Role and RoleBinding resources (should match workspace namespace)
  namespace: default
  # whether to create organization/team-based role and role bindings
  createOrgsRole: true
  # Falls back to github.orgs when unset (empty [] is treated as unset by Helm).
  # To disable RBAC subjects, set githubRbac.create: false — not an empty list.
  orgs: []
    # GitHub oauth can support teamless org membership access
    # However dex cannot match it to a group, so do NOT use
    # - name: example-org-2
    #   teams:
    #     - team-1
  createUsersRoles: false
  users: []
    # - username1

# OAuth2 Proxy configuration
oauth2Proxy:
  # OAuth2 Proxy image settings
  repository: quay.io/oauth2-proxy/oauth2-proxy
  imageTag: v7.15.3
  # Node selector for oauth2-proxy pods (overrides chart-level nodeSelector)
  nodeSelector: {}
  # Tolerations for oauth2-proxy pods (overrides chart-level tolerations)
  tolerations: []
  # oauth2-proxy is a control-plane singleton (handles login flows only, not per-request auth).
  # Horizontal scaling requires shared session state — kept as a fixed replica count for now.
  replicas: 1
  # Cookie secret for OAuth2 Proxy (generate with openssl rand -base64 32 | tr -- '+/' '-_')
  cookieSecret: ""
  # Cookie expiry duration (Go duration string, e.g. "8h", "1h30m")
  # This is the single source of truth for session timing — web-app session
  # cookie max age, max lifetime, and near-expiry threshold are derived from this
  cookieExpire: "8h"
  # Cookie refresh interval (Go duration string)
  cookieRefresh: "1h"
  # initContainer config for dex availability checks
  dexCheck:
    # Maximum time to wait for Dex to be available in seconds
    timeout_seconds: 300
  # Skip authentication for certain paths (useful for WebSockets)
  skipAuthRegex: []

# ============================================================================
# Web App (Self-Service UI) - OPTIONAL
# ============================================================================
# Enable this to provide a web-based UI for users to manage their workspaces
# through a browser instead of using kubectl commands.
#
# When enabled:
#   - Users can access the UI at https://<domain>/
#   - Create, view, update, and delete workspaces through the web interface
#   - Authenticated via GitHub OAuth through Dex
#
# When disabled:
#   - Users must use kubectl to manage workspaces
#   - All workspace management is done via Kubernetes API
#   - No web interface is available
# ============================================================================
webApp:
  # Node selector for web-app pods (overrides chart-level nodeSelector)
  nodeSelector: {}
  # Tolerations for web-app pods (overrides chart-level tolerations)
  tolerations: []
  # Enable or disable the web UI (default: true)
  enabled: true
  # replicas is used only when keda.enabled is false
  replicas: 2
  # KEDA ScaledObject configuration — scales web-app based on Traefik open
  # connections. web-app has no /metrics endpoint, so Traefik's connection count
  # is used as a proxy for active user sessions.
  # Opt-in: see traefik.keda notes on cluster prerequisites.
  keda:
    enabled: false
    minReplicas: 2
    maxReplicas: 20
    # How long to wait after the last scale-up before scaling down.
    # Conservative — UI availability matters more than tight bin-packing.
    cooldownPeriodSeconds: 300
    # How often KEDA queries Prometheus for the metric.
    pollingIntervalSeconds: 30
    # Scale up when average open connections per replica exceeds this threshold.
    # Higher than traefik/authmiddleware — web-app is stateless and lightweight,
    # handling more concurrent sessions per pod.
    targetOpenConnections: "200"
    prometheusAddress: "http://prometheus-server.monitoring.svc.cluster.local:80"
  imagePullPolicy: Always
  repository: ghcr.io/jupyter-infra
  imageName: jupyter-k8s-ui
  imageTag: v0.1.3
  # Kubernetes namespace where workspaces are created and managed
  namespace: default
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  # Session cookie configuration for auth fast path
  # Timing values (cookieMaxAge, maxLifetime, nearExpiryThreshold) are
  # automatically derived from oauth2Proxy.cookieExpire
  session:
    cookieName: "workspace_console_session"
    cookiePath: "/api/"
    secretName: "web-app-session-secret"
    numberOfKeys: 3
    newKeyUseDelaySecs: 5
  # Kubectl access page — lets users download a kubeconfig setup script.
  # clusterName gates the feature: set it to enable, leave empty to disable.
  # We use clusterName rather than a separate 'enabled' flag because these values
  # have no defaults — they come from the EKS cluster at deploy time. If clusterName
  # is set, the admin has opted in and provided the companion values (apiServer, caCert).
  # OIDC issuer URL and client ID/secret are derived from chart values (domain + dex.*).
  clusterAccess:
    # Cluster name shown in kubeconfig context
    clusterName: ""
    # K8s API server URL (e.g., https://XXXXX.gr7.us-west-2.eks.amazonaws.com)
    apiServer: ""
    # Base64-encoded cluster CA certificate (kubectl config embeds this)
    caCertBase64: ""
    # Localhost port for kubelogin OIDC callback
    oidcCallbackPort: 9800

# Authmiddleware configuration
authmiddleware:
  # Node selector for authmiddleware pods (overrides chart-level nodeSelector)
  nodeSelector: {}
  # Tolerations for authmiddleware pods (overrides chart-level tolerations)
  tolerations: []
  # Whether to deploy the authmiddleware component
  enabled: true
  # Number of replicas (used when keda.enabled is false)
  replicas: 2
  # KEDA ScaledObject configuration — scales authmiddleware based on Traefik open
  # connections. authmiddleware is a ForwardAuth called on every workspace request
  # with no session cookie bypass, so it scales with active workspace sessions.
  # Opt-in: see traefik.keda notes on cluster prerequisites.
  keda:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    # How long to wait after the last scale-up before scaling down.
    cooldownPeriodSeconds: 300
    # How often KEDA queries Prometheus for the metric.
    pollingIntervalSeconds: 30
    # Scale up when average open connections per replica exceeds this threshold.
    # >= traefik's threshold: every connection authmiddleware sees is already an
    # open connection on traefik, but per connection authmiddleware does far less
    # work (lightweight cookie checks + simple K8s API calls) than traefik (which
    # holds WebSocket tunnels and streams payloads), so it tolerates more
    # connections per pod. Values are pre-load-test estimates.
    targetOpenConnections: "150"
    prometheusAddress: "http://prometheus-server.monitoring.svc.cluster.local:80"
  # Authmiddleware image settings
  imagePullPolicy: Always
  repository: ghcr.io/jupyter-infra
  imageName: jupyter-k8s-authmiddleware
  imageTag: v0.2.0
  # Resource limits and requests
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 64Mi
  # JWT configuration
  jwtIssuer: "jupyter-k8s-auth"
  jwtAudience: "workspace-users"
  jwtExpiration: "1h"
  jwtRefreshEnable: "true"
  jwtRefreshWindow: "15m"
  jwtRefreshHorizon: "12h"
  jwtNewKeyUseDelay: "5s"
  # Secret configuration for multi-key JWT signing
  secretName: "authmiddleware-secrets"
  # Cookie configuration
  cookieName: "workspace_auth"
  cookieSecure: "true"
  cookiePath: "/"
  cookieMaxAge: "24h"
  cookieHttpOnly: "true"
  cookieSameSite: "lax"
  # Path configuration
  pathRegexPattern: "^(/workspaces/[^/]+/[^/]+)(?:/.*)?$"
  workspaceNamespacePathRegex: "^/workspaces/([^/]+)/[^/]+"
  workspaceNamePathRegex: "^/workspaces/[^/]+/([^/]+)"
  # Server configuration
  readTimeout: "10s"
  writeTimeout: "10s"
  shutdownTimeout: "30s"
  # Bearer auth configuration
  enableOauth: true
  enableBearerAuth: false
  # Timeout in seconds for OIDC provider initialization
  oidcInitTimeoutSecs: 30

# JWT Secret Rotator configuration
rotator:
  # Node selector for rotator pods (overrides chart-level nodeSelector)
  nodeSelector: {}
  # Tolerations for rotator pods (overrides chart-level tolerations)
  tolerations: []
  # Whether to enable automatic JWT secret rotation
  enabled: true
  # Rotator image settings
  imagePullPolicy: Always
  repository: ghcr.io/jupyter-infra
  imageName: jupyter-k8s-rotator
  imageTag: v0.2.0
  # Rotation interval (how often to rotate keys)
  # Must be parseable as a duration (e.g., "15m", "1h")
  rotationInterval: "15m"
  # Number of keys to keep (older keys are pruned after rotation)
  # Must satisfy: numberOfKeys * rotationInterval >= jwtExpiration + buffer
  # Recommended: 6 keys for 15m rotation with 1h expiration (90min retention)
  numberOfKeys: 6
  # Resource limits for the CronJob
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 50m
      memory: 32Mi